name: Daily ETF Rotation Signal

# Runs every weekday at 5:30 PM IST (after Indian market close).
# GitHub uses UTC.  IST = UTC + 5:30.
# 5:30 PM IST = 17:30 IST = 12:00 UTC.
on:
  schedule:
    - cron: "0 12 * * 1-5"   # Mon-Fri, 12:00 UTC = 17:30 IST (5:30 PM)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

concurrency: 
  group: etf-signal-automation
  cancel-in-progress: false
# Allow the workflow to commit the updated CSV log + state back to the repo
permissions:
  contents: write

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal
        env:
          # "switch_only" = you ONLY get a message when the position changes
          # (SWITCH or first ENTER). Change to "always" for a daily message.
          ALERT_MODE: "switch_only"
          # --- Email ---
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # --- Telegram ---
          TELEGRAM_ENABLED: ${{ vars.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_signal.py

      - name: Commit log + state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_log.csv position_state.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "signal: update log & state [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
